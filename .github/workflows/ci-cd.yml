name: CI/CD — Execução Service

on:
  push:
    branches: [homolog, main]
  pull_request:
    branches: [homolog, main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DOTNET_VERSION: '8.0.x'

jobs:
  ci-tests:
    name: Build, Testes e Quality Gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache SonarCloud
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Install tools
        run: |
          dotnet tool install --global dotnet-sonarscanner
          dotnet tool install --global dotnet-coverage

      - run: dotnet restore oficinafiap-execucao-service.sln

      - name: SonarCloud Begin
        if: env.SONAR_TOKEN != ''
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          dotnet sonarscanner begin \
            /k:"aka-kensei_oficinafiap-execucao-service" \
            /o:"aka-kensei" \
            /d:sonar.token="${{ secrets.SONAR_TOKEN }}" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.cs.vscoveragexml.reportsPaths=coverage.xml

      - run: dotnet build oficinafiap-execucao-service.sln --no-restore --configuration Release

      - run: dotnet test Oficina.Execucao.Domain.UnitTests/ --no-build --configuration Release --verbosity normal
      - run: dotnet test Oficina.Execucao.Application.UnitTests/ --no-build --configuration Release --verbosity normal

      - name: Cobertura agregada
        run: dotnet-coverage collect 'dotnet test oficinafiap-execucao-service.sln --no-build --configuration Release' -f xml -o coverage.xml

      - name: SonarCloud End
        if: env.SONAR_TOKEN != ''
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

  build-and-push:
    name: Build & Push Docker
    runs-on: ubuntu-latest
    needs: ci-tests
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-homolog:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/homolog' && github.event_name == 'push'
    environment:
      name: homolog
    steps:
      - run: echo ">>> Deploy Execução em homolog"

  deploy-prod:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
    steps:
      - run: echo ">>> Deploy Execução em produção (gated)"
